worker_processes auto;
error_log stderr info;

events {}

wasm {
    module auth_filter filters/auth_filter.wasm;
    module header_filter filters/header_filter.wasm;
    module observe_filter filters/observe_filter.wasm;
}

http {
    log_format gateway_json escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"upstream_addr":"$upstream_addr",'
        '"request_id":"$sent_http_x_request_id",'
        '"trace_id":"$sent_http_x_trace_id",'
        '"tenant_id":"$sent_http_x_tenant_id",'
        '"gateway_route":"$sent_http_x_gateway_route",'
        '"plugin_chain":"$sent_http_x_gateway_plugin_chain",'
        '"plugin_decision":"$sent_http_x_gateway_decision",'
        '"filter_version":"$sent_http_x_gateway_filter_version"}';
    access_log /dev/stdout gateway_json;

    upstream users_upstream {
        server users:8080;
    }

    upstream orders_upstream {
        server orders:8080;
    }

    server {
        listen 8080;

        location /users/ {
            proxy_wasm auth_filter;
            proxy_wasm header_filter;
            proxy_wasm observe_filter;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://users_upstream;
        }

        location /orders/ {
            proxy_wasm auth_filter;
            proxy_wasm header_filter;
            proxy_wasm observe_filter;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://orders_upstream;
        }

        location / {
            default_type application/json;
            return 404 '{"error":{"code":"not_found","message":"route not found"}}';
        }
    }
}
