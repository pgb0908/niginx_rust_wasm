worker_processes auto;
error_log stderr info;

events {}

wasm {
    module gateway_filter_v2 filters/gateway_filter_v2.wasm;
}

http {
    upstream users_upstream {
        server users:8080;
    }

    upstream orders_upstream {
        server orders:8080;
    }

    server {
        listen 8080;

        location /users/ {
            proxy_wasm gateway_filter_v2;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://users_upstream;
        }

        location /orders/ {
            proxy_wasm gateway_filter_v2;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://orders_upstream;
        }

        location / {
            default_type application/json;
            return 404 '{"error":{"code":"not_found","message":"route not found"}}';
        }
    }
}
